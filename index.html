<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeDroid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="drag-region"></div>
    <div class="pixel-frame">
        <div class="camera-hole"></div>
        <div class="screen-content" id="screen">
            <div class="splash" id="splash-view">
                <h1>VibeDroid</h1>
                <p>Ready for Code</p>
                
                <div class="url-input-container">
                    <input type="text" id="dev-url" placeholder="e.g. http://localhost:5173" value="http://localhost:5173" />
                    <button id="connect-btn">Connect</button>
                </div>
            </div>
            <webview id="app-view" src="" style="display: none;" autosize="on" allowpopups></webview>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const splashView = document.getElementById('splash-view');
        const appView = document.getElementById('app-view');
        const connectBtn = document.getElementById('connect-btn');
        const urlInput = document.getElementById('dev-url');

        function loadApp(url) {
            if (!url.startsWith('http')) url = 'http://' + url;
            splashView.style.display = 'none';
            appView.style.display = 'flex';
            appView.src = url;
        }

        // Handle URL from CLI arguments
        ipcRenderer.on('load-url', (event, url) => {
            loadApp(url);
        });

        // Handle manual connection from splash screen
        connectBtn.addEventListener('click', () => {
            if (urlInput.value) loadApp(urlInput.value);
        });

        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && urlInput.value) loadApp(urlInput.value);
        });
    </script>
</body>
</html>
